services:
  - type: web
    name: cheongdam-atelier-crm
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash render_start.sh
    envVars:
      - key: CRM_ADMIN_USERNAME
        sync: false
      - key: CRM_ADMIN_PASSWORD
        sync: false
      - key: CRM_SESSION_SECRET
        sync: false
